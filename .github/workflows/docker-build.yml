name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 提取版本号的准备 job
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      full-version: ${{ steps.extract-version.outputs.full-version }}
      major-minor-version: ${{ steps.extract-version.outputs.major-minor-version }}
      image-name: ${{ steps.set-image-name.outputs.image-name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set lowercase image name
        id: set-image-name
        run: echo "image-name=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Extract version from package.json
        id: extract-version
        run: |
          FULL_VERSION=$(node -p "require('./package.json').version")
          MAJOR_MINOR_VERSION=$(echo "$FULL_VERSION" | sed -E 's/^([0-9]+\.[0-9]+)\.[0-9]+$/\1/')
          echo "full-version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "major-minor-version=$MAJOR_MINOR_VERSION" >> $GITHUB_OUTPUT
          echo "Extracted full version: $FULL_VERSION"
          echo "Extracted major.minor version: $MAJOR_MINOR_VERSION"

  # AMD64 架构构建
  build-amd64:
    if: github.repository == 'laoshuikaixue/VoiceHub' || github.event_name == 'workflow_dispatch'
    needs: extract-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-amd64
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-amd64
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ARM64 架构构建
  build-arm64:
    if: github.repository == 'laoshuikaixue/VoiceHub' || github.event_name == 'workflow_dispatch'
    needs: extract-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-arm64
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-arm64
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ARM v7 架构构建
  build-arm-v7:
    if: github.repository == 'laoshuikaixue/VoiceHub' || github.event_name == 'workflow_dispatch'
    needs: extract-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (arm/v7)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/arm/v7
          tags: |
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-armv7
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-armv7
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-armv7
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ARM v6 架构构建
  build-arm-v6:
    if: github.repository == 'laoshuikaixue/VoiceHub' || github.event_name == 'workflow_dispatch'
    needs: extract-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (arm/v6)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/arm/v6
          tags: |
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-armv6
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-armv6
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-armv6
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # PPC64LE 架构构建
  build-ppc64le:
    if: github.repository == 'laoshuikaixue/VoiceHub' || github.event_name == 'workflow_dispatch'
    needs: extract-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (ppc64le)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/ppc64le
          tags: |
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-ppc64le
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-ppc64le
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-ppc64le
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # S390X 架构构建
  build-s390x:
    if: github.repository == 'laoshuikaixue/VoiceHub' || github.event_name == 'workflow_dispatch'
    needs: extract-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image (s390x)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          platforms: linux/s390x
          tags: |
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-s390x
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-s390x
            ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-s390x
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 创建并推送多架构 manifest
  create-manifest:
    if: github.repository == 'laoshuikaixue/VoiceHub' && github.event_name != 'pull_request'
    needs: [extract-version, build-amd64, build-arm64, build-arm-v7, build-arm-v6, build-ppc64le, build-s390x]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest (full version)
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }} \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-amd64 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-arm64 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-armv7 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-armv6 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-ppc64le \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}-s390x
          docker manifest push ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.full-version }}

      - name: Create and push multi-arch manifest (major.minor version)
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }} \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-amd64 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-arm64 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-armv7 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-armv6 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-ppc64le \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}-s390x
          docker manifest push ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:${{ needs.extract-version.outputs.major-minor-version }}

      - name: Create and push multi-arch manifest (latest)
        run: |
          docker manifest create ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-amd64 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-arm64 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-armv7 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-armv6 \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-ppc64le \
            --amend ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest-s390x
          docker manifest push ${{ env.REGISTRY }}/${{ needs.extract-version.outputs.image-name }}:latest
