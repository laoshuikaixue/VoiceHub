            type=ref,event=pr
            type=raw,value=${{ needs.extract-version.outputs.full-version }}
            type=raw,value=${{ needs.extract-version.outputs.major-minor-version }}

      - name: Build and push Docker image (arm64)
        uses: docker/build-push-action@v7
