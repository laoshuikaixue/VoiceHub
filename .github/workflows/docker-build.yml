name: Build and Push Docker Image

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual trigger'
        required: false
        default: 'Manual trigger'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # 提取版本号的准备 job
  extract-version:
    runs-on: ubuntu-latest
    outputs:
      full-version: ${{ steps.extract-version.outputs.full-version }}
      major-minor-version: ${{ steps.extract-version.outputs.major-minor-version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Extract version from package.json
        id: extract-version
        run: |
          FULL_VERSION=$(node -p "require('./package.json').version")
          MAJOR_MINOR_VERSION=$(echo "$FULL_VERSION" | sed -E 's/^([0-9]+\.[0-9]+)\.[0-9]+$/\1/')
          echo "full-version=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "major-minor-version=$MAJOR_MINOR_VERSION" >> $GITHUB_OUTPUT
          echo "Extracted full version: $FULL_VERSION"
          echo "Extracted major.minor version: $MAJOR_MINOR_VERSION"

  # AMD64 架构构建
  build-amd64:
    if: github.repository == 'laoshuikaixue/VoiceHub' || github.event_name == 'workflow_dispatch'
    needs: extract-version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: '0'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=raw,value=${{ needs.extract-version.outputs.full-version }}
            type=raw,value=${{ needs.extract-version.outputs.major-minor-version }}

      - name: Build and push Docker image (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ARM64 架构构建
  build-arm64:
    if: github.repository == 'laoshuikaixue/VoiceHub' || github.event_name == 'workflow_dispatch'
    needs: extract-version
